<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>前身バンド ライブ — FanGNU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Antique&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #e63329; --black: #111; --white: #fff; --gray: #888; --border: #ddd; --bg: #fbf2d9; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--black); line-height: 1.6; padding-bottom: 58px; }
    a { color: inherit; text-decoration: none; }
    .nav { position: sticky; top: 0; z-index: 100; background: var(--white); border-bottom: 2px solid var(--black); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 52px; }
    .nav-logo { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 700; }
    .nav-logo .red { color: var(--red); }
    .nav-links { display: flex; gap: 1.75rem; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; }
    .nav-links a { color: var(--gray); transition: color 0.15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--black); }
    .nav-links a.active { border-bottom: 1px solid var(--black); }

    .bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; display: flex; background: var(--white); border-top: 2px solid var(--black); z-index: 200; }
    .bn-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 8px 4px 6px; font-size: 9px; font-weight: 700; letter-spacing: 0.02em; color: var(--gray); transition: color 0.15s; }
    .bn-item:hover { color: var(--black); }
    .bn-item.active { color: var(--red); }
    .bn-icon { font-size: 18px; line-height: 1; }
    .page-header { padding: 3rem 2rem 2.5rem; border-bottom: 2px solid var(--black); background: var(--white); }
    .page-header-tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--gray); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px; }
    .page-header-tag::before { content: ''; display: inline-block; width: 20px; height: 2px; background: var(--red); }
    .page-header-title { font-family: 'Zen Antique', serif; font-size: 52px; line-height: 1; letter-spacing: -0.01em; }
    .page-header-title .red { color: var(--red); }
    .page-header-desc { font-size: 12px; color: var(--gray); margin-top: 1rem; letter-spacing: 0.05em; }
    .page-header-actions { display: flex; gap: 10px; margin-top: 1.25rem; }
    .header-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; border: 1px solid var(--black); padding: 8px 18px; background: var(--black); color: var(--white); transition: background 0.15s; }
    .header-btn:hover { background: var(--red); border-color: var(--red); }
    .content { max-width: 1000px; margin: 0 auto; padding: 2rem; display: flex; flex-direction: column; gap: 1px; }

    .tour-block { background: var(--white); border: 1px solid var(--border); }
    .tour-header { cursor: pointer; border-left: 4px solid var(--red); padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; transition: background 0.15s; }
    .tour-header:hover { background: var(--bg); }
    .tour-year { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; color: var(--gray); letter-spacing: 0.12em; flex-shrink: 0; }
    .tour-name { font-size: 16px; font-weight: 900; color: var(--black); flex: 1; min-width: 200px; }
    .tour-scale { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--red); }
    .tour-toggle { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--gray); flex-shrink: 0; transition: transform 0.15s; }
    .tour-block.expanded .tour-toggle { transform: rotate(180deg); }

    .live-list { display: none; flex-direction: column; }
    .tour-block.expanded .live-list { display: flex; }

    .live-item { cursor: pointer; display: grid; grid-template-columns: 100px 1fr auto auto; align-items: center; gap: 1rem; padding: 0.875rem 1.5rem; border-top: 1px solid var(--border); transition: background 0.15s; }
    .live-item:hover { background: var(--bg); }
    .live-date { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; color: var(--black); }
    .live-venue { font-size: 13px; color: var(--black); }
    .live-badge { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 700; padding: 2px 8px; background: var(--black); color: var(--white); white-space: nowrap; }
    .live-badge.sold { background: var(--red); }
    .live-arrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gray); flex-shrink: 0; }
    .no-live { padding: 2.5rem; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gray); background: var(--white); border: 1px dashed var(--border); }
    .footer { padding: 2rem; border-top: 2px solid var(--black); display: flex; align-items: center; justify-content: space-between; background: var(--white); margin-top: 2rem; }
    .footer-logo { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 700; }
    .footer-logo .red { color: var(--red); }
    .footer-copy { font-size: 10px; color: var(--gray); text-align: right; }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .page-header-title { font-size: 36px; }
      .live-item { grid-template-columns: 1fr auto; }
      .footer { flex-direction: column; gap: 1rem; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="../index.html" class="nav-logo">Fan<span class="red">GNU</span></a>
    <div class="nav-links">
      <a href="members/members.html">メンバー</a>
      <a href="discography.html">ディスコグラフィー</a>
      <a href="live.html">ライブ</a>
    </div>
  </nav>

  <div class="page-header">
    <div class="page-header-tag">LIVE / TOUR / EARLY ERA</div>
    <h1 class="page-header-title">前身バンド<span class="red">.</span></h1>
    <p class="page-header-desc">King Gnu 結成以前のライブ活動記録。</p>
    <div class="page-header-actions">
      <a href="live.html" class="header-btn">← King Gnu ライブ</a>
    </div>
  </div>

  <div class="content" id="liveContent"></div>

  <footer class="footer">
    <a href="../index.html" class="footer-logo">Fan<span class="red">GNU</span></a>
    <div class="footer-copy">非公式ファンサイト。King Gnuおよび関係各社とは一切関係ありません。<br>© FanGNU Unofficial</div>
  </footer>

  <script>
  function escH(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function buildShow(show) {
    const badgeHtml = show.status
      ? `<span class="live-badge${show.status === 'SOLD OUT' ? ' sold' : ''}">${escH(show.status)}</span>`
      : `<span></span>`;
    return `
      <a class="live-item" href="live-show.html?src=srvvinci&date=${encodeURIComponent(show.date)}">
        <div class="live-date">${escH(show.date)}</div>
        <div class="live-venue">${escH(show.venue || '未定')}</div>
        ${badgeHtml}
        <span class="live-arrow">→</span>
      </a>`;
  }

  function buildTour(tour) {
    return `
      <div class="tour-block">
        <div class="tour-header">
          <div class="tour-year">${escH(tour.year)}</div>
          <div class="tour-name">${escH(tour.name)}</div>
          <div class="tour-scale">${escH(tour.scale)}</div>
          <span class="tour-toggle">▼</span>
        </div>
        <div class="live-list">${tour.shows.map(buildShow).join('')}</div>
      </div>`;
  }

  function bindToggles() {
    document.querySelectorAll('.tour-block').forEach(block => {
      block.querySelector('.tour-header').addEventListener('click', () => {
        block.classList.toggle('expanded');
      });
    });
  }

  fetch('data/srvvinci-live.json')
    .then(res => res.json())
    .then(data => {
      const content = document.getElementById('liveContent');
      if (!data.tours || !data.tours.length) {
        content.innerHTML = `<div class="no-live">ライブ情報はまだありません。</div>`;
        return;
      }
      content.innerHTML = data.tours.map(buildTour).join('');
      bindToggles();
    })
    .catch(err => {
      document.getElementById('liveContent').textContent = 'データの読み込みに失敗しました。';
      console.error(err);
    });
  </script>

  <nav class="bottom-nav">
    <a href="../index.html" class="bn-item"><span class="bn-icon">🏠</span>ホーム</a>
    <a href="discography.html" class="bn-item"><span class="bn-icon">💿</span>ディスコグラフィー</a>
    <a href="members/members.html" class="bn-item"><span class="bn-icon">👥</span>メンバー</a>
    <a href="gear.html" class="bn-item"><span class="bn-icon">🎸</span>機材</a>
    <a href="live.html" class="bn-item active"><span class="bn-icon">🎤</span>ライブ</a>
  </nav>

</body>
</html>
