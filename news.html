<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ニュース — FanGNU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Antique&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #e63329; --black: #111; --white: #fff; --gray: #888; --border: #ddd; --bg: #fbf2d9; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--black); line-height: 1.6; }
    a { color: inherit; text-decoration: none; }

    .nav { position: sticky; top: 0; z-index: 100; background: var(--white); border-bottom: 2px solid var(--black); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 52px; }
    .nav-logo { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 700; }
    .nav-logo .red { color: var(--red); }
    .nav-links { display: flex; gap: 1.75rem; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; }
    .nav-links a { color: var(--gray); transition: color 0.15s; }
    .nav-links a:hover { color: var(--black); }

    .breadcrumb { padding: 0.75rem 2rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--gray); border-bottom: 1px solid var(--border); background: var(--white); display: flex; gap: 8px; align-items: center; }
    .breadcrumb a:hover { color: var(--black); }
    .breadcrumb-sep { color: var(--border); }

    .page-header { background: var(--white); border-bottom: 2px solid var(--black); padding: 2.5rem 2rem 2rem; }
    .page-header-inner { max-width: 900px; margin: 0 auto; }
    .page-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--gray); margin-bottom: 0.5rem; }
    .page-title { font-family: 'Zen Antique', serif; font-size: 40px; line-height: 1.1; }

    .content { max-width: 900px; margin: 0 auto; padding: 2rem; }

    .filters { display: flex; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 2rem; }
    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: var(--gray); }
    .filter-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-btn { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; padding: 4px 12px; border: 1px solid var(--border); background: var(--white); cursor: pointer; transition: background 0.12s, color 0.12s, border-color 0.12s; }
    .filter-btn:hover { border-color: var(--black); }
    .filter-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
    .filter-btn[data-cat="MUSIC"].active { background: #111; }
    .filter-btn[data-cat="LIVE"].active { background: var(--red); border-color: var(--red); }
    .filter-btn[data-cat="SOLO"].active { background: #2255cc; border-color: #2255cc; }
    .filter-btn[data-cat="ACTOR"].active { background: #119944; border-color: #119944; }
    .filter-btn[data-cat="OTHER"].active { background: #888; border-color: #888; }
    .filter-btn[data-member="tsuneta"].active { background: var(--red); border-color: var(--red); }
    .filter-btn[data-member="iguchi"].active { background: #2255cc; border-color: #2255cc; }
    .filter-btn[data-member="arai"].active { background: #119944; border-color: #119944; }
    .filter-btn[data-member="seki"].active { background: #cc8800; border-color: #cc8800; }

    .search-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
    .search-input { width: 220px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 5px 10px; border: 1px solid var(--border); background: var(--white); outline: none; }
    .search-input:focus { border-color: var(--black); }
    .news-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gray); }

    .news-list { display: flex; flex-direction: column; background: var(--white); border: 1px solid var(--border); }
    .news-item { display: flex; align-items: baseline; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .news-item:last-child { border-bottom: none; }
    .news-date { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--gray); white-space: nowrap; min-width: 76px; }
    .news-badge { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 700; padding: 2px 7px; white-space: nowrap; }
    .news-member-tag { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 700; padding: 2px 7px; white-space: nowrap; border: 1px solid var(--border); color: var(--gray); }
    .news-body { flex: 1; }
    .news-title { font-weight: 700; color: var(--black); margin-bottom: 2px; }
    .news-text { font-size: 12px; color: #555; }

    .no-results { padding: 3rem; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--gray); }

    .footer { padding: 2rem; border-top: 2px solid var(--black); display: flex; align-items: center; justify-content: space-between; background: var(--white); margin-top: 3rem; }
    .footer-logo { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 700; }
    .footer-logo .red { color: var(--red); }
    .footer-copy { font-size: 10px; color: var(--gray); letter-spacing: 0.05em; text-align: right; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .content { padding: 1.5rem 1rem; }
      .news-item { flex-wrap: wrap; gap: 6px; }
      .footer { flex-direction: column; gap: 1rem; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-logo">Fan<span class="red">GNU</span></a>
    <div class="nav-links">
      <a href="members.html">メンバー</a>
      <a href="discography.html">ディスコグラフィー</a>
      <a href="live.html">ライブ</a>
      <a href="timeline.html">年表</a>
      <a href="blog.html">ブログ</a>
      <a href="bbs.html">掲示板</a>
      <a href="contact.html">お問い合わせ</a>
    </div>
  </nav>

  <div class="breadcrumb">
    <a href="index.html">HOME</a>
    <span class="breadcrumb-sep">/</span>
    NEWS
  </div>

  <div class="page-header">
    <div class="page-header-inner">
      <div class="page-label">NEWS</div>
      <div class="page-title">ニュース一覧</div>
    </div>
  </div>

  <div class="content">

    <div class="filters">
      <div class="filter-group">
        <div class="filter-label">CATEGORY</div>
        <div class="filter-btns">
          <button class="filter-btn active" data-cat="ALL">ALL</button>
          <button class="filter-btn" data-cat="MUSIC">MUSIC</button>
          <button class="filter-btn" data-cat="LIVE">LIVE</button>
          <button class="filter-btn" data-cat="SOLO">SOLO</button>
          <button class="filter-btn" data-cat="ACTOR">ACTOR</button>
          <button class="filter-btn" data-cat="OTHER">OTHER</button>
        </div>
      </div>
      <div class="filter-group">
        <div class="filter-label">MEMBER</div>
        <div class="filter-btns">
          <button class="filter-btn active" data-member="ALL">ALL</button>
          <button class="filter-btn" data-member="tsuneta">常田大希</button>
          <button class="filter-btn" data-member="iguchi">井口理</button>
          <button class="filter-btn" data-member="arai">新井和輝</button>
          <button class="filter-btn" data-member="seki">勢喜遊</button>
          <button class="filter-btn" data-member="band">バンド全体</button>
        </div>
      </div>
    </div>

    <div class="search-wrap">
      <input class="search-input" id="newsSearch" type="text" placeholder="キーワードで絞り込む…">
      <span class="news-count" id="newsCount"></span>
    </div>
    <div class="news-list" id="newsContainer"></div>

  </div>

  <footer class="footer">
    <a href="index.html" class="footer-logo">Fan<span class="red">GNU</span></a>
    <div class="footer-copy">
      非公式ファンサイト。King Gnuおよび関係各社とは一切関係ありません。<br>
      © FanGNU Unofficial
    </div>
  </footer>

  <script src="news.js"></script>
  <script>
    const MEMBER_LABELS = {
      tsuneta: '常田大希',
      iguchi:  '井口理',
      arai:    '新井和輝',
      seki:    '勢喜遊'
    };
    const MEMBER_COLORS = {
      tsuneta: { bg: '#e63329', color: '#fff' },
      iguchi:  { bg: '#2255cc', color: '#fff' },
      arai:    { bg: '#119944', color: '#fff' },
      seki:    { bg: '#cc8800', color: '#fff' }
    };
    const CAT_COLORS = {
      MUSIC: { bg: '#111',     color: '#fff' },
      LIVE:  { bg: '#e63329',  color: '#fff' },
      SOLO:  { bg: '#2255cc',  color: '#fff' },
      ACTOR: { bg: '#119944',  color: '#fff' },
      OTHER: { bg: '#888',     color: '#fff' }
    };

    let activeCat = 'ALL';
    let activeMember = 'ALL';
    let activeQuery = '';

    function getFiltered() {
      const q = activeQuery.toLowerCase();
      return NEWS.filter(n => {
        const catOk = activeCat === 'ALL' || n.category === activeCat;
        const memberOk =
          activeMember === 'ALL' ? true :
          activeMember === 'band' ? n.member === null :
          n.member === activeMember;
        const queryOk = !q ||
          n.title.toLowerCase().includes(q) ||
          n.body.toLowerCase().includes(q);
        return catOk && memberOk && queryOk;
      });
    }

    function render() {
      const filtered = getFiltered();
      const container = document.getElementById('newsContainer');
      const countEl = document.getElementById('newsCount');
      countEl.textContent = filtered.length + ' 件';

      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-results">該当するニュースはありません</div>';
        return;
      }

      container.innerHTML = filtered.map(n => {
        const c = CAT_COLORS[n.category] || CAT_COLORS.OTHER;
        const memberTag = n.member
          ? (() => { const mc = MEMBER_COLORS[n.member] || {}; return `<span class="news-badge" style="background:${mc.bg};color:${mc.color}">${MEMBER_LABELS[n.member] || n.member}</span>`; })()
          : `<span class="news-member-tag">バンド全体</span>`;
        return `
          <div class="news-item">
            <div class="news-date">${escHtmlNews(n.date)}</div>
            <div class="news-badge" style="background:${c.bg};color:${c.color}">${n.category}</div>
            ${memberTag}
            <div class="news-body">
              <div class="news-title">${escHtmlNews(n.title)}</div>
              <div class="news-text">${escHtmlNews(n.body)}</div>
            </div>
          </div>`;
      }).join('');
    }

    document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-cat]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCat = btn.dataset.cat;
        render();
      });
    });

    document.querySelectorAll('.filter-btn[data-member]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-member]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeMember = btn.dataset.member;
        render();
      });
    });

    document.getElementById('newsSearch').addEventListener('input', e => {
      activeQuery = e.target.value;
      render();
    });

    render();
  </script>
</body>
</html>
