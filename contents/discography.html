<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discography — FanGNU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Antique&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #e63329; --black: #111; --white: #fff; --gray: #888; --border: #ddd; --bg: #fbf2d9; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--black); line-height: 1.6; }
    a { color: inherit; text-decoration: none; }

    .nav { position: sticky; top: 0; z-index: 100; background: var(--white); border-bottom: 2px solid var(--black); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 52px; }
    .nav-logo { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 700; }
    .nav-logo .red { color: var(--red); }
    .nav-links { display: flex; gap: 1.75rem; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; }
    .nav-links a { color: var(--gray); transition: color 0.15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--black); }
    .nav-links a.active { border-bottom: 1px solid var(--black); }

    .page-header { padding: 3rem 2rem 2.5rem; border-bottom: 2px solid var(--black); background: var(--white); }
    .page-header-tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--gray); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px; }
    .page-header-tag::before { content: ''; display: inline-block; width: 20px; height: 2px; background: var(--red); }
    .page-header-title { font-family: 'Zen Antique', serif; font-size: 64px; line-height: 1; letter-spacing: -0.02em; }
    .page-header-title .red { color: var(--red); }
    .page-header-desc { font-size: 12px; color: var(--gray); margin-top: 1rem; letter-spacing: 0.05em; }
    .page-header-actions { display: flex; gap: 10px; margin-top: 1.25rem; }
    .header-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; border: 1px solid var(--black); padding: 8px 18px; background: var(--black); color: var(--white); transition: background 0.15s; }
    .header-btn:hover { background: var(--red); border-color: var(--red); }

    .filter-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0.9rem 2rem; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .filter-btn { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; border: 1px solid var(--border); padding: 4px 14px; cursor: pointer; background: var(--white); transition: background 0.15s, color 0.15s; }
    .filter-btn:hover, .filter-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
    .filter-count { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--gray); margin-left: auto; }

    .content { max-width: 1600px; margin: 0 auto; padding: 2rem; }

    .disc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

    .disc-card { background: var(--white); padding: 1.25rem; display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--border); }
    .disc-card.hidden { display: none; }

    .disc-type-badge { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; color: var(--white); padding: 2px 8px; display: inline-block; width: fit-content; }
    .disc-type-badge.ALBUM  { background: var(--red); }
    .disc-type-badge.SINGLE { background: #444; }
    .disc-type-badge.EP     { background: #2255cc; }
    .disc-type-badge.COVER  { background: #119944; }
    .disc-type-badge.INDIE      { background: #888; }
    .disc-type-badge.UNRELEASED { background: #7c3aed; }

    .disc-year  { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--gray); }
    .disc-title { font-size: 15px; font-weight: 700; color: var(--black); line-height: 1.3; }
    .disc-note  { font-size: 11px; color: #555; line-height: 1.6; }

    .disc-tracks { margin-top: 6px; }
    .disc-track-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--gray); letter-spacing: 0.1em; margin-bottom: 3px; }
    .disc-track-list  { font-size: 11px; color: #444; line-height: 1.8; }

    .mv-thumb-wrap { margin-top: 10px; position: relative; cursor: pointer; }
    .mv-thumb-wrap img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .mv-thumb-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.25); transition: background 0.15s; }
    .mv-thumb-wrap:hover .mv-thumb-play { background: rgba(0,0,0,0.45); }
    .mv-thumb-play-btn { width: 44px; height: 44px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .mv-thumb-play-btn::after { content: ''; border-style: solid; border-width: 9px 0 9px 18px; border-color: transparent transparent transparent #fff; margin-left: 4px; }
    .mv-embed { display: none; }
    .mv-embed.open { display: block; margin-top: 10px; }
    .mv-embed iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

    .album-section { max-width: 1600px; margin: 0 auto; padding: 0 2rem 3rem; }
    .album-sec-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--gray); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; padding-top: 2rem; border-top: 2px solid var(--black); }
    .album-sec-label::before { content: ''; display: inline-block; width: 20px; height: 2px; background: var(--red); }

    .album-card { background: var(--white); border: 1px solid var(--border); margin-bottom: 16px; }
    .album-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 12px; }
    .album-title { font-size: 18px; font-weight: 700; }
    .album-year  { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--gray); }
    .album-note  { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--gray); margin-left: auto; letter-spacing: 0.06em; }

    .track-grid { display: grid; grid-template-columns: repeat(2, 1fr); }
    .track-row { display: flex; align-items: center; gap: 10px; padding: 9px 1.25rem; border-bottom: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0; }
    .track-row:nth-child(even) { border-right: none; }
    .track-row:nth-last-child(-n+2) { border-bottom: none; }
    .track-num  { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #bbb; width: 22px; flex-shrink: 0; }
    .track-title { font-size: 12px; font-weight: 500; flex: 1; }
    .track-play { width: 24px; height: 24px; background: var(--red); border: none; border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
    .track-play:hover { background: #c0251b; }
    .track-play::after { content: ''; border-style: solid; border-width: 5px 0 5px 10px; border-color: transparent transparent transparent #fff; margin-left: 2px; }
    .track-play.open { background: #444; border-radius: 4px; }
    .track-play.open::after { border: none; content: '✕'; color: #fff; font-size: 9px; margin: 0; }
    .track-embed { display: none; grid-column: 1 / -1; }
    .track-embed.open { display: block; padding: 0 1.25rem 1rem; }
    .track-embed iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

    @media (max-width: 768px) { .track-grid { grid-template-columns: 1fr; } .track-row { border-right: none; } }

    .footer { padding: 2rem; border-top: 2px solid var(--black); display: flex; align-items: center; justify-content: space-between; background: var(--white); margin-top: 2rem; }
    .footer-logo { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 700; }
    .footer-logo .red { color: var(--red); }
    .footer-copy { font-size: 10px; color: var(--gray); letter-spacing: 0.05em; text-align: right; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .page-header-title { font-size: 44px; }
      .disc-grid { grid-template-columns: 1fr; gap: 12px; }
      .footer { flex-direction: column; gap: 1rem; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-logo">Fan<span class="red">GNU</span></a>
    <div class="nav-links">
      <a href="members/members.html">メンバー</a>
      <a href="discography.html" class="active">ディスコグラフィー</a>
      <a href="live.html">ライブ</a>
    </div>
  </nav>

  <div class="page-header">
    <div class="page-header-tag">DISCOGRAPHY</div>
    <h1 class="page-header-title">Discography<span class="red">.</span></h1>
    <p class="page-header-desc">King Gnu 名義の全シングル・アルバムを収録。</p>
    <div class="page-header-actions">
      <a href="srvvinci.html" class="header-btn">Srv.Vinci ディスコグラフィー →</a>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="ALL">ALL</button>
    <button class="filter-btn" data-filter="ALBUM">ALBUM</button>
    <button class="filter-btn" data-filter="SINGLE">SINGLE</button>
    <button class="filter-btn" data-filter="EP">EP</button>
    <button class="filter-btn" data-filter="COVER">COVER</button>
    <button class="filter-btn" data-filter="UNRELEASED">UNRELEASED</button>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <div class="content" id="discContent"></div>

  <div class="album-section">
    <div class="album-sec-label">ALBUMS</div>
    <div id="albumContent"></div>
  </div>

  <footer class="footer">
    <a href="../index.html" class="footer-logo">Fan<span class="red">GNU</span></a>
    <div class="footer-copy">
      非公式ファンサイト。King Gnuおよび関係各社とは一切関係ありません。<br>
      © FanGNU Unofficial
    </div>
  </footer>

  <script>
  let DISCS = [];
  let ALBUMS = [];

  function escH(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function buildCard(item) {
    const tracksHtml = item.tracks
      ? `<div class="disc-tracks"><div class="disc-track-label">TRACKS</div><div class="disc-track-list">${escH(item.tracks)}</div></div>`
      : '';
    const mvBtnHtml = item.yt
      ? `<div class="mv-thumb-wrap" data-yt="${escH(item.yt)}">
           <img src="https://img.youtube.com/vi/${escH(item.yt)}/mqdefault.jpg" alt="${escH(item.title)} MV" loading="lazy">
           <div class="mv-thumb-play"><div class="mv-thumb-play-btn"></div></div>
         </div>
         <div class="mv-embed"></div>`
      : '';
    return `
      <div class="disc-card" data-type="${escH(item.type)}">
        <span class="disc-type-badge ${escH(item.type)}">${escH(item.type)}</span>
        <div class="disc-year">${escH(item.year)}</div>
        <div class="disc-title">${escH(item.title)}</div>
        ${item.note ? `<div class="disc-note">${escH(item.note)}</div>` : ''}
        ${tracksHtml}
        ${mvBtnHtml}
      </div>`;
  }

  function render(filter) {
    const content = document.getElementById('discContent');
    const allItems = DISCS.flatMap(era => era.items).filter(i => i.type !== 'ALBUM');
    content.innerHTML = `<div class="disc-grid">${allItems.map(buildCard).join('')}</div>`;

    applyFilter(filter);

    content.querySelectorAll('.mv-thumb-wrap').forEach(thumb => {
      thumb.addEventListener('click', () => {
        const embed = thumb.nextElementSibling;
        thumb.style.display = 'none';
        embed.classList.add('open');
        embed.innerHTML = `<iframe src="https://www.youtube.com/embed/${thumb.dataset.yt}?rel=0&autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
      });
    });
  }

  function applyFilter(filter) {
    let total = 0;
    document.querySelectorAll('.disc-card').forEach(card => {
      const match = filter === 'ALL' || card.dataset.type === filter;
      card.classList.toggle('hidden', !match);
      if (match) total++;
    });
    document.getElementById('filterCount').textContent = total + ' 件';
    // アルバムセクションは ALBUM or ALL のときのみ表示
    const albumSection = document.querySelector('.album-section');
    if (albumSection) albumSection.style.display = (filter === 'ALL' || filter === 'ALBUM') ? '' : 'none';
  }

  function renderAlbums() {
    const container = document.getElementById('albumContent');
    container.innerHTML = ALBUMS.map((album, ai) => {
      const trackRows = album.tracks.map((t, ti) => {
        const id = `al${ai}_tr${ti}`;
        return `
          <div class="track-row">
            <span class="track-num">${String(t.num).padStart(2,'0')}</span>
            <span class="track-title">${escH(t.title)}</span>
            <button class="track-play" data-yt="${escH(t.yt)}" data-id="${id}" aria-label="再生"></button>
          </div>
          <div class="track-embed" id="${id}"></div>`;
      }).join('');
      return `
        <div class="album-card">
          <div class="album-header">
            <span class="album-title">${escH(album.title)}</span>
            <span class="album-year">${escH(album.year)}</span>
            <span class="album-note">${escH(album.note)}</span>
          </div>
          <div class="track-grid">${trackRows}</div>
        </div>`;
    }).join('');

    container.querySelectorAll('.track-play').forEach(btn => {
      btn.addEventListener('click', () => {
        const embed = document.getElementById(btn.dataset.id);
        const isOpen = btn.classList.contains('open');
        if (isOpen) {
          btn.classList.remove('open');
          embed.classList.remove('open');
          embed.innerHTML = '';
        } else {
          btn.classList.add('open');
          embed.classList.add('open');
          const yt = btn.dataset.yt;
          embed.innerHTML = `
            <div class="mv-thumb-wrap" data-yt="${yt}">
              <img src="https://img.youtube.com/vi/${yt}/mqdefault.jpg" alt="thumbnail" loading="lazy">
              <div class="mv-thumb-play"><div class="mv-thumb-play-btn"></div></div>
            </div>
            <div class="mv-embed"></div>`;
          embed.querySelector('.mv-thumb-wrap').addEventListener('click', () => {
            const thumbWrap = embed.querySelector('.mv-thumb-wrap');
            const mv = embed.querySelector('.mv-embed');
            thumbWrap.style.display = 'none';
            mv.classList.add('open');
            mv.innerHTML = `<iframe src="https://www.youtube.com/embed/${yt}?rel=0&autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
          });
        }
      });
    });
  }

  // データ読み込み → 初期描画
  fetch('data/discography.json')
    .then(res => res.json())
    .then(data => {
      DISCS = data.eras;
      ALBUMS = data.albums;
      render('ALL');
      renderAlbums();
    })
    .catch(err => {
      document.getElementById('discContent').textContent = 'データの読み込みに失敗しました。';
      console.error(err);
    });

  // フィルターボタン
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter(btn.dataset.filter);
    });
  });
  </script>

</body>
</html>
