<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>楽曲詳細 — FanGNU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Antique&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #e63329; --black: #111; --white: #fff; --gray: #888; --border: #ddd; --bg: #fbf2d9; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--black); line-height: 1.6; padding-bottom: 58px; }
    a { color: inherit; text-decoration: none; }

    .nav { position: sticky; top: 0; z-index: 100; background: var(--white); border-bottom: 2px solid var(--black); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 52px; }
    .nav-logo { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 700; }
    .nav-logo .red { color: var(--red); }
    .nav-links { display: flex; gap: 1.75rem; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; }
    .nav-links a { color: var(--gray); transition: color 0.15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--black); }
    .nav-links a.active { border-bottom: 1px solid var(--black); }

    .bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; display: flex; background: var(--white); border-top: 2px solid var(--black); z-index: 200; }
    .bn-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 8px 4px 6px; font-size: 9px; font-weight: 700; letter-spacing: 0.02em; color: var(--gray); transition: color 0.15s; }
    .bn-item:hover { color: var(--black); }
    .bn-item.active { color: var(--red); }
    .bn-icon { font-size: 18px; line-height: 1; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; margin: 1.25rem 2rem 0; padding: 0; background: none; border: none; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: var(--gray); cursor: pointer; }
    .back-link:hover { color: var(--black); }

    .page-header { padding: 0.75rem 2rem 2.5rem; border-bottom: 2px solid var(--black); background: var(--white); }
    .disc-type-badge { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; color: var(--white); padding: 2px 8px; display: inline-block; width: fit-content; margin-bottom: 1rem; }
    .disc-type-badge.ALBUM  { background: var(--red); }
    .disc-type-badge.SINGLE { background: #444; }
    .disc-type-badge.EP     { background: #2255cc; }
    .disc-type-badge.COVER  { background: #119944; }
    .disc-type-badge.INDIE      { background: #888; }
    .disc-type-badge.UNRELEASED { background: #7c3aed; }
    .disc-type-badge.DEMO       { background: #7c3aed; }

    .page-header-title { font-family: 'Zen Antique', serif; font-size: 48px; line-height: 1.2; letter-spacing: -0.02em; }

    .content { max-width: 800px; margin: 0 auto; padding: 2.5rem 2rem; display: flex; flex-direction: column; gap: 2rem; }

    .mv-thumb-wrap { position: relative; cursor: pointer; }
    .mv-thumb-wrap img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .mv-thumb-play { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.25); transition: background 0.15s; }
    .mv-thumb-wrap:hover .mv-thumb-play { background: rgba(0,0,0,0.45); }
    .mv-thumb-play-btn { width: 56px; height: 56px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .mv-thumb-play-btn::after { content: ''; border-style: solid; border-width: 11px 0 11px 22px; border-color: transparent transparent transparent #fff; margin-left: 5px; }
    .mv-embed { display: none; }
    .mv-embed.open { display: block; }
    .mv-embed iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }

    .no-video { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--gray); padding: 3rem 0; text-align: center; border: 1px dashed var(--border); }

    .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--gray); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px; }
    .section-label::before { content: ''; display: inline-block; width: 16px; height: 2px; background: var(--red); }
    .spotify-embed iframe { width: 100%; border: none; border-radius: 12px; display: block; }

    .song-info { background: var(--white); border: 1px solid var(--border); }
    .song-info-row { display: flex; gap: 16px; padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--border); }
    .song-info-row:last-child { border-bottom: none; }
    .song-info-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--gray); width: 110px; flex-shrink: 0; padding-top: 2px; }
    .song-info-value { font-size: 13px; color: var(--black); line-height: 1.7; }
    .song-info-value.empty { color: var(--gray); }

    .footer { padding: 2rem; border-top: 2px solid var(--black); display: flex; align-items: center; justify-content: space-between; background: var(--white); margin-top: 2rem; }
    .footer-logo { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 700; }
    .footer-logo .red { color: var(--red); }
    .footer-copy { font-size: 10px; color: var(--gray); letter-spacing: 0.05em; text-align: right; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .page-header-title { font-size: 34px; }
      .song-info-row { flex-direction: column; gap: 4px; }
      .footer { flex-direction: column; gap: 1rem; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-logo">Fan<span class="red">GNU</span></a>
    <div class="nav-links">
      <a href="members/members.html">メンバー</a>
      <a href="discography.html">ディスコグラフィー</a>
      <a href="live.html">ライブ</a>
    </div>
  </nav>

  <button type="button" class="back-link" id="backLink">← 戻る</button>

  <div class="page-header">
    <span class="disc-type-badge" id="typeBadge"></span>
    <h1 class="page-header-title" id="songTitle">読み込み中…</h1>
  </div>

  <div class="content">
    <div id="mediaArea"></div>

    <div id="spotifyArea"></div>

    <dl class="song-info">
      <div class="song-info-row">
        <dt class="song-info-label">収録アルバム</dt>
        <dd class="song-info-value" id="infoAlbum">-</dd>
      </div>
      <div class="song-info-row">
        <dt class="song-info-label">リリース日</dt>
        <dd class="song-info-value" id="infoYear">-</dd>
      </div>
      <div class="song-info-row">
        <dt class="song-info-label">タイアップ情報</dt>
        <dd class="song-info-value" id="infoNote">-</dd>
      </div>
      <div class="song-info-row">
        <dt class="song-info-label">その他</dt>
        <dd class="song-info-value" id="infoExtra">-</dd>
      </div>
    </dl>
  </div>

  <footer class="footer">
    <a href="../index.html" class="footer-logo">Fan<span class="red">GNU</span></a>
    <div class="footer-copy">
      非公式ファンサイト。King Gnuおよび関係各社とは一切関係ありません。<br>
      © FanGNU Unofficial
    </div>
  </footer>

  <script>
  function escH(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setInfo(id, value) {
    const el = document.getElementById(id);
    if (value) {
      el.textContent = value;
      el.classList.remove('empty');
    } else {
      el.textContent = '-';
      el.classList.add('empty');
    }
  }

  function renderMedia(yt, title) {
    const mediaArea = document.getElementById('mediaArea');
    if (!yt) {
      mediaArea.innerHTML = `<div class="no-video">この曲の動画は見つかりませんでした。</div>`;
      return;
    }
    mediaArea.innerHTML = `
      <div class="mv-thumb-wrap" data-yt="${escH(yt)}">
        <img src="https://img.youtube.com/vi/${escH(yt)}/hqdefault.jpg" alt="${escH(title)} MV" loading="lazy">
        <div class="mv-thumb-play"><div class="mv-thumb-play-btn"></div></div>
      </div>
      <div class="mv-embed"></div>`;
    mediaArea.querySelector('.mv-thumb-wrap').addEventListener('click', () => {
      const thumb = mediaArea.querySelector('.mv-thumb-wrap');
      const embed = mediaArea.querySelector('.mv-embed');
      thumb.style.display = 'none';
      embed.classList.add('open');
      embed.innerHTML = `<iframe src="https://www.youtube.com/embed/${yt}?rel=0&autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
    });
  }

  function parseSpotify(value) {
    if (!value) return null;
    if (!/^https?:\/\//.test(value)) return { type: 'track', id: value };
    const m = value.match(/open\.spotify\.com\/(?:intl-[a-z]{2}\/)?(track|album|episode|show)\/([a-zA-Z0-9]+)/);
    return m ? { type: m[1], id: m[2] } : null;
  }

  function renderSpotify(spotifyValue) {
    const area = document.getElementById('spotifyArea');
    const parsed = parseSpotify(spotifyValue);
    if (!parsed) {
      area.innerHTML = '';
      return;
    }
    const height = parsed.type === 'track' || parsed.type === 'episode' ? 152 : 352;
    area.innerHTML = `
      <div class="section-label">SPOTIFY</div>
      <div class="spotify-embed">
        <iframe src="https://open.spotify.com/embed/${parsed.type}/${parsed.id}?utm_source=generator"
          height="${height}" loading="lazy"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
      </div>`;
  }

  function renderSong(song) {
    document.title = (song.title ? song.title + ' — ' : '') + '楽曲詳細 — FanGNU';

    const typeBadge = document.getElementById('typeBadge');
    if (song.type) {
      typeBadge.textContent = song.type;
      typeBadge.classList.add(song.type);
    } else {
      typeBadge.style.display = 'none';
    }

    document.getElementById('songTitle').textContent = song.title || '（タイトル不明）';

    setInfo('infoAlbum', song.album ? `${song.album.title}${song.album.num ? `（${String(song.album.num).padStart(2,'0')}）` : ''}` : '');
    setInfo('infoYear', song.year);
    setInfo('infoNote', song.note);
    setInfo('infoExtra', song.extra);

    renderMedia(song.yt, song.title);
    renderSpotify(song.spotify);
  }

  function renderNotFound() {
    document.getElementById('songTitle').textContent = '曲が見つかりませんでした';
    document.getElementById('typeBadge').style.display = 'none';
    renderMedia('', '');
    renderSpotify('');
  }

  async function findInDiscography(yt) {
    const res = await fetch('data/kinggnu-discography.json');
    const data = await res.json();
    const item = data.items.find(i => i.yt === yt);
    if (!item) return null;

    let album = null;
    for (const a of data.albums) {
      const track = (a.tracks || []).find(t => t.yt === yt);
      if (track) { album = { title: a.title, num: track.num }; break; }
    }

    return { type: item.type, title: item.title, year: item.year, note: item.note, extra: item.extra, yt: item.yt, spotify: item.spotify, album };
  }

  async function findInSrvvinci(yt) {
    const res = await fetch('data/srvvinci-discography.json');
    const data = await res.json();
    for (const group of data.groups) {
      const pools = [
        ...(group.demos || []).map(d => ({ ...d, type: 'DEMO' })),
        ...(group.singles || []).map(d => ({ ...d, type: 'SINGLE' })),
        ...(group.albums || []).map(d => ({ ...d, type: 'ALBUM' })),
      ];
      const item = pools.find(i => i.yt === yt);
      if (item) return { type: item.type, title: item.title, year: '', note: '', extra: item.extra, yt: item.yt, spotify: item.spotify, album: null };
    }
    return null;
  }

  const params = new URLSearchParams(location.search);
  const yt  = params.get('yt') || '';
  const src = params.get('src') === 'srvvinci' ? 'srvvinci' : 'discography';

  const lookup = src === 'srvvinci' ? findInSrvvinci(yt) : findInDiscography(yt);
  lookup
    .then(song => song ? renderSong(song) : renderNotFound())
    .catch(err => {
      console.error(err);
      renderNotFound();
    });

  document.getElementById('backLink').addEventListener('click', () => {
    if (document.referrer && document.referrer.includes(location.host)) {
      history.back();
    } else {
      location.href = 'discography.html';
    }
  });
  </script>

  <nav class="bottom-nav">
    <a href="../index.html" class="bn-item"><span class="bn-icon">🏠</span>ホーム</a>
    <a href="discography.html" class="bn-item"><span class="bn-icon">💿</span>ディスコグラフィー</a>
    <a href="members/members.html" class="bn-item"><span class="bn-icon">👥</span>メンバー</a>
    <a href="gear.html" class="bn-item"><span class="bn-icon">🎸</span>機材</a>
    <a href="live.html" class="bn-item"><span class="bn-icon">🎤</span>ライブ</a>
  </nav>

</body>
</html>
